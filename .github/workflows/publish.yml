name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Publish to npm
        if: env.NODE_AUTH_TOKEN != ''
        run: npm publish --provenance
      - name: Skip npm publish
        if: env.NODE_AUTH_TOKEN == ''
        run: echo "NPM_TOKEN is not configured; package publish was skipped."
